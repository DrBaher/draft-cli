name: publish

on:
  push:
    tags:
      - 'v*'

# npm Trusted Publishing via OIDC — NO token. Trusted Publisher is configured
# on npm for DrBaher/draft-cli → publish.yml → environment npm.
#
# Do NOT add `registry-url:` to actions/setup-node: it writes a placeholder
# NODE_AUTH_TOKEN into .npmrc and npm sends *that* instead of fetching an OIDC
# token — the masked-401/404 that blocked the earlier pure-OIDC attempts
# (v0.3.0/v0.3.1). Dropping registry-url (and the NPM_TOKEN fallback) lets npm
# >= 11.5.1 perform Trusted Publishing. Verified working on the sibling
# package contract-ops-mcp (v0.1.1, 2026-05-24).

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: ensure npm >= 11.5.1 (OIDC support)
        run: npm install -g npm@latest && npm --version
      - run: npm ci
      - run: npm test
      - name: verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
      - run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — npm mints a short-lived OIDC token via id-token:write.
