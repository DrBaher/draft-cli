name: publish

on:
  push:
    tags:
      - 'v*'

# Uses npm Trusted Publishing via OIDC. One-time setup at:
#   https://www.npmjs.com/settings/<account>/trusted-publishers
# Configure: repo = DrBaher/draft-cli, workflow = publish.yml, environment = npm
# Once configured, NO npm token is needed in repo secrets.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # Node 22 needed for npm CLI 11.5.1+, which is the minimum for
          # Trusted Publishing OIDC. Node 20 ships with npm 10.x, which
          # falls back to setup-node@v6's NODE_AUTH_TOKEN placeholder
          # (XXXXX-...) when no real token is set, producing a 404 from
          # npm — the failure we hit on v0.3.0's first ship attempt.
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm test
      - name: verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          # NPM_TOKEN fallback restored after pure-OIDC publish failed
          # on both v0.3.0 (Node 20, npm 10.x) and v0.3.1 (Node 22, npm
          # 11.x). setup-node@v6 with registry-url writes a placeholder
          # NODE_AUTH_TOKEN into env, and npm CLI uses that placeholder
          # rather than fetching an OIDC token — even when id-token:
          # write is set and Trusted Publisher is configured. Root cause
          # still under investigation (see memory:
          # feedback_oidc_setup_node_v6_placeholder.md). Trusted Publisher
          # stays configured on npm so the switch back to OIDC is a
          # one-line change once the cause is understood.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
